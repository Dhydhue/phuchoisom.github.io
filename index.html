<style>
:root {
    --primary-color: #0f52ba; /* Medical Blue */
    --accent-color: #2563eb;
    --bg-light: #f8fafc;
    --text-main: #1e293b;
    --text-muted: #64748b;
    --white: #ffffff;
    --shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
}

body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background-color: var(--bg-light);
    color: var(--text-main);
    margin: 0;
    line-height: 1.6;
}

.container-medical {
    max-width: 1000px;
    margin: 0 auto;
    padding: 20px 15px;
}

/* Slider */
.slider {
    position: relative;
    width: 100%;
    height: 250px;
    overflow: hidden;
    border-radius: 20px;
    box-shadow: var(--shadow);
    margin-bottom: 30px;
}
.slide {
    position: absolute;
    width: 100%;
    height: 100%;
    opacity: 0;
    animation: slideShow 10s infinite;
}
.slide img { width: 100%; height: 100%; object-fit: cover; }
.caption {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: linear-gradient(transparent, rgba(0,0,0,0.8));
    padding: 30px 20px 15px;
    color: #fff;
}
.caption h3 { font-size: 18px; margin: 0; font-weight: 700; text-transform: uppercase; }

@keyframes slideShow {
    0%, 10% { opacity: 0; }
    20%, 50% { opacity: 1; }
    60%, 100% { opacity: 0; }
}

/* Card Common */
.med-card {
    background: var(--white);
    border-radius: 20px;
    padding: 25px;
    margin-bottom: 25px;
    box-shadow: var(--shadow);
    border: 1px solid rgba(0,0,0,0.03);
}

.title-border {
    font-size: 24px;
    font-weight: 700;
    color: var(--primary-color);
    border-left: 6px solid var(--primary-color);
    padding-left: 15px;
    margin-bottom: 20px;
    text-transform: uppercase;
}

/* Video Container - TO & RÕ */
.video-wrapper {
    position: relative;
    width: 100%;
    padding-bottom: 56.25%; /* Tỷ lệ 16:9 */
    margin: 20px 0;
    border-radius: 15px;
    overflow: hidden;
    background: #000;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}
.video-wrapper iframe {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
}

/* Highlight Box */
.highlight-blue {
    background: #eff6ff;
    border-left: 5px solid var(--accent-color);
    padding: 15px;
    border-radius: 12px;
    margin: 15px 0;
}
.highlight-green {
    background: #ecfdf5;
    padding: 20px;
    border-radius: 15px;
}

/* Events Grid */
.events-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 20px;
    margin-top: 20px;
}

.event-item {
    background: var(--white);
    border-radius: 15px;
    overflow: hidden;
    box-shadow: var(--shadow);
    text-align: center;
    transition: transform 0.3s;
}
.event-item:hover { transform: translateY(-5px); }
.event-item img { width: 100%; height: 200px; object-fit: cover; }
.event-item p { font-weight: 700; padding: 15px; margin: 0; color: var(--primary-color); }

/* Footer */
.med-footer {
    background: #0f172a;
    color: #f1f5f9;
    padding: 40px 20px;
    border-radius: 20px;
    margin-top: 40px;
}

/* Responsive */
@media (min-width: 768px) {
    .slider { height: 450px; }
    .caption h3 { font-size: 28px; }
    .events-grid { grid-template-columns: repeat(3, 1fr); }
    .med-card { padding: 40px; }
    .title-border { font-size: 28px; }
}
</style>
